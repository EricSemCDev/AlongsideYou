name: Build Game

on: [push]

jobs:
  build:
    name: Build para WebGL
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
      - uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
        with:
          targetPlatform: WebGL
          customImage: unityci/editor:ubuntu-6000.0.43f1-webgl-3.1
      - uses: actions/upload-artifact@v4
        with:
          name: Build
          path: build/WebGL
